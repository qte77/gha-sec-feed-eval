---
name: publish-release

# Manually publishes a GitHub Release for an existing tag with notes
# extracted from CHANGELOG.md, generates an SBOM via Syft, and attaches
# build provenance attestations. Decoupled from tag-release.yaml so the
# default flow stays "tag only" — the operator opts into a Release
# object via this dispatch when ready.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (defaults to the latest v* tag)"
        required: false
        type: string

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write       # for attest-build-provenance
      attestations: write   # for attest-build-provenance
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve tag + extract notes
        id: resolve
        env:
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          else
            TAG=$(git tag --list 'v*' --sort=-v:refname | head -1)
          fi
          if [ -z "$TAG" ]; then
            echo "no v* tag found"; exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "tag $TAG does not exist locally"; exit 1
          fi
          VERSION="${TAG#v}"
          NOTES=$(awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { in_block = 1; next }
            in_block && /^## \[/ { exit }
            in_block { print }
          ' CHANGELOG.md)
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "notes<<NOTES_EOF"
            if [ -z "${NOTES// }" ]; then
              echo "Release $TAG. See CHANGELOG.md."
            else
              echo "$NOTES"
            fi
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create source tarball
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          git archive --format=tar.gz --prefix="gha-sec-feed-eval-${TAG#v}/" \
            -o "gha-sec-feed-eval-${TAG#v}.tar.gz" "$TAG"

      - name: Generate Syft SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest source tarball
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: "gha-sec-feed-eval-*.tar.gz"

      - name: Attest SBOM
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: sbom.spdx.json

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.tag }}
          NOTES: ${{ steps.resolve.outputs.notes }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists; aborting"; exit 1
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            "gha-sec-feed-eval-${TAG#v}.tar.gz" \
            sbom.spdx.json
