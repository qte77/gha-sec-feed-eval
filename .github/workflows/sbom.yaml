---
# Software Bill of Materials generation via qte77/gha-sbom-action.
# https://github.com/qte77/gha-sbom-action
#
# Triggers: push to main on dep tree changes, weekly Sunday cron,
# manual dispatch. Outputs committed under docs/SBOM/ via auto-PR.
name: Generate SBOM

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions: {}

jobs:
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: qte77/gha-sbom-action@cd873b1278a6793a99cfe199c01d603d72cca717  # v0.1.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
