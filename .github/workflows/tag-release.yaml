---
name: tag-release

# Watches main for pyproject.toml version changes (typically the
# squash-merge of a bump-my-version release PR) and creates the
# **signed** annotated `v$NEW` tag against the actual main commit
# via the GitHub API (POST /repos/.../git/tags) — required by
# gh-security-posture rule 03 which mandates required_signatures
# on refs/tags/v*. Plain `git tag -a -m` would produce an unsigned
# tag and be rejected at push.

on:
  push:
    branches: [main]
    paths: [pyproject.toml]

permissions: {}

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 2  # HEAD + parent so we can diff the version line

      - name: Detect version bump
        id: detect
        run: |
          set -euo pipefail
          NEW=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          OLD=$(git show HEAD^:pyproject.toml | grep -m1 '^version = ' | sed -E 's/version = "(.*)"/\1/')
          if [ "$NEW" = "$OLD" ]; then
            echo "no version change ($OLD == $NEW); nothing to tag"
            exit 0
          fi
          COMMIT_SHA=$(git rev-parse HEAD)
          {
            echo "new=$NEW"
            echo "commit_sha=$COMMIT_SHA"
            echo "bumped=true"
          } >> "$GITHUB_OUTPUT"

      - name: Create signed annotated tag via GitHub API
        if: steps.detect.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          NEW: ${{ steps.detect.outputs.new }}
          COMMIT_SHA: ${{ steps.detect.outputs.commit_sha }}
        run: |
          set -euo pipefail
          if gh api "repos/$REPO/git/refs/tags/v$NEW" >/dev/null 2>&1; then
            echo "tag v$NEW already exists; aborting"
            exit 1
          fi
          # Create annotated tag object — GitHub signs it server-side
          # when the request goes through web-flow (gh + GITHUB_TOKEN).
          TAG_SHA=$(gh api "repos/$REPO/git/tags" \
            -f tag="v$NEW" \
            -f message="Release v$NEW" \
            -f object="$COMMIT_SHA" \
            -f type=commit \
            --jq '.sha')
          gh api "repos/$REPO/git/refs" \
            -f ref="refs/tags/v$NEW" \
            -f sha="$TAG_SHA"
