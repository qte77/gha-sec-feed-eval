---
name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: lint + types + complexity + lint_md + lint_links + test_cov
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev + test dependencies
        run: uv sync --frozen --group dev --group test

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pyright type check
        run: uv run pyright src

      - name: Complexipy cognitive complexity (max 10)
        run: uv run complexipy src --max-complexity-allowed 10

      - name: Markdownlint
        run: |
          npx --yes markdownlint-cli --config .markdownlint.json '**/*.md' \
            --ignore '.venv/**' --ignore 'node_modules/**' \
            --ignore 'changelog.d/**'

      - name: Pytest with coverage
        run: uv run pytest --cov=src --cov-fail-under=70
